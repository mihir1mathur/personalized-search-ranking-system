# =============================================================================
# search-app.conf  --  nginx reverse proxy for the search ranking system.
# -----------------------------------------------------------------------------
# Exposes the Streamlit UI at  http://<host>/  and the FastAPI Swagger docs at
# http://<host>/api/  . The FastAPI service itself stays bound to loopback and
# is NOT exposed directly to the internet.
#
# Install:
#   sudo cp deployment/nginx/search-app.conf /etc/nginx/sites-available/search-app
#   sudo ln -s /etc/nginx/sites-available/search-app /etc/nginx/sites-enabled/
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx
#
# Streamlit REQUIRES WebSocket upgrade headers to work behind a proxy -- the
# `map` + `Upgrade`/`Connection` headers below handle that.
#
# server_name is a placeholder (YOUR_DOMAIN). Until you run the HTTPS setup this
# is the only enabled server block (setup_ec2.sh removes nginx's default site),
# so nginx treats it as the default server and serves every request by public IP
# regardless of Host -- IP-based access keeps working. When you point a real
# domain at the box, run deployment/scripts/setup_https.sh: it rewrites this
# server_name and lets Certbot add the TLS listener + HTTP->HTTPS redirect. Do
# NOT hand-add `listen 443` / `ssl_certificate` here -- Certbot manages those,
# and dangling cert paths make `nginx -t` fail before a certificate exists.
# =============================================================================

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    # Placeholder domain. Replace YOUR_DOMAIN with your real domain/subdomain, or
    # let deployment/scripts/setup_https.sh set it for you. Leaving it as-is does
    # NOT break IP-based access (this is the default server block on :80).
    server_name YOUR_DOMAIN;

    # Cross-encoder / LTR cold queries take a couple of seconds on CPU; allow
    # generous upstream timeouts so nginx does not 504 a legitimate slow query.
    proxy_read_timeout 120s;
    proxy_send_timeout 120s;
    client_max_body_size 4m;

    # ---- Streamlit UI (home) ------------------------------------------------
    location / {
        proxy_pass http://127.0.0.1:8501;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---- FastAPI backend (Swagger, health, raw API) -------------------------
    # Strips the /api prefix: /api/docs -> :8000/docs, /api/health -> :8000/health
    location /api/ {
        proxy_pass http://127.0.0.1:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---- Lightweight liveness endpoint for ALB/monitoring -------------------
    location = /healthz {
        proxy_pass http://127.0.0.1:8000/health;
        access_log off;
    }
}
